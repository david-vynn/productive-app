<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Productive App</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Tulis tugas baru...">
            <button id="addBtn">Tambah</button>
        </div>

        <ul id="taskList"></ul>

        <div class="timer-section">
            <h2>Timer</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-buttons">
                <button id="startBtn">Mulai</button>
                <button id="pauseBtn">Pause</button>
                <button id="resetBtn">Reset</button>
            </div>
        </div>

        <div class="notes-section">
            <h2>Notes</h2>

            <div class="notes-input-area">
                <div class="input-notes-title">
                    <input type="text" id="noteTitleInput" placeholder="Judul catatan...">            
                </div>
                <div class="input-notes-content">
                    <textarea id="noteContentInput" placeholder="Isi catatan..."></textarea>
                </div>
                <button id="saveNoteBtn">Simpan</button>
            </div>

            <ul id="noteList"></ul>
        </div>
        
        
        <div class="feed-section">
            <h2>Progress Feed</h2>
            
            <div class="food-input-area">
                <textarea id="feedInput" placeholder="Bagikan progressmu hari ini..."></textarea>
                <button id="postBtn">Post</button>
            </div>
            
            <div id="feedList"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
